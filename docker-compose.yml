version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: wwt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-api:
    build: ./auth-api
    container_name: auth_api_service
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "${AUTH_DOCKER_PORT}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATA_API_URL: http://data-api:8081

  data-api:
    build: ./data-api
    container_name: data_api_service
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "${DATA_DOCKER_PORT}:8081"
    environment:
      SERVER_PORT: 8081