databaseChangeLog:
  - changeSet:
      author: rmaksym1
      id: create-processing-logs-table
      changes:
        - createTable:
            tableName: processing_logs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_users_id
                    references: users(id)
              - column:
                  name: input_text
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: output_text
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false